services:
  - type: web
    name: attendance-system
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --import=tsx
    disk:
      name: attendance-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
