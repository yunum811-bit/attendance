services:
  - type: web
    name: attendance-system
    runtime: node
    nodeVersion: "20"
    buildCommand: npm install && npx vite build
    startCommand: npx tsx src/server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: attendance-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
